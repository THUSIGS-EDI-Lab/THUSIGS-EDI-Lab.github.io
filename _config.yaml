# site properties and page defaults
title: Embodied Decision Intelligence Lab (EDI Lab)
subtitle: 清华大学具身决策智能实验室
description: 'Toward scalable decision intelligence in the physical world'
url: https://tihayakousaka.github.io
baseurl: ""
header: images/school.jpg
footer: images/school.jpg
proofer: false
future: true

# site social media and other links
links:
  email: yuchao@sz.tsinghua.edu.cn
  google-scholar: BYoq_bwAAAAJ
  github: THUSIGS-EDI-Lab
  orcid: 0000-0001-6975-0158

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post
  # Markdown files in /_cources
  - scope:
      type: "courses"
    values:
      layout: course

collections:
  # generate page for each member
  members:
    output: false
  # generate page for each post
  posts:
    output: true
  # generate page for each course
  courses:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
